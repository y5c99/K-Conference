{% extends 'base.html' %}

{% block title %}New Track — {{ conference.name }}{% endblock %}

{% block content %}
<section class="page-head">
    <h1>Add Track to {{ conference.name }}</h1>
</section>

<form method="post" class="big-form panel">
    {% csrf_token %}
    {% for field in form %}
        <div class="form-row">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="field-error">{{ field.errors.0 }}</div>{% endif %}
        </div>
    {% endfor %}

    <div class="form-actions">
        <button type="submit" class="btn-primary">Add Track</button>
        <a href="{% url 'conference:detail' conference.pk %}" class="btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
