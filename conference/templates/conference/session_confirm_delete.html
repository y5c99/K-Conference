{% extends 'base.html' %}

{% block content %}
<section class="panel">
    <h1>Delete Session</h1>
    <p>Delete session <strong>{{ session.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn-danger" type="submit">Yes, delete</button>
        <a href="{% url 'conference:detail' session.conference.pk %}" class="btn-secondary">Cancel</a>
    </form>
</section>
{% endblock %}
